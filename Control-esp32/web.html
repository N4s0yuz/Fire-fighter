<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển Robot</title>
    <style>
        
        body { 
            font-family: 'Times New Roman', serif;
            margin: 0; 
            padding: 20px; 
            background-color: #e2e8f0;
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px;
            justify-content: center;
        }

        .box {
            background: white;
            border: 2px solid #333;
            padding: 15px;
            box-shadow: 5px 5px 0px #888;
        }

        .streamvideo { flex: 1; min-width: 320px; text-align: center; }
        #stream {
            width: 100%; max-width: 320px; border: 1px solid #999;
            background-color: #ccc; min-height: 240px;
            image-rendering: pixelated;
        }

        .controlbox {
            width: 320px; text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        h3 { margin-top: 0; border-bottom: 2px dashed #666; padding-bottom: 10px; width: 100%; }
        
        .status { font-weight: bold; color: #dc2626; margin-bottom: 10px; }
        .status.ok { color: #16a34a; }

        .joy-bg {
            width: 180px; height: 180px;
            background-color: #cbd5e1;
            border: 3px solid #475569;
            border-radius: 50%;
            position: relative;
            margin: 20px 0;
            display: flex; justify-content: center; align-items: center;
            touch-action: none;
        }
        .joy-stick {
            width: 60px; height: 60px;
            background-color: #334155;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            border: 2px solid white;
        }
        .joy-stick:active { background-color: #0f172a; }

        .maybomnuoc {
            width: 100%; background-color: #fca5a5;
            border: 2px solid #b91c1c; color: #7f1d1d;
            padding: 15px; font-size: 18px; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }
        .maybomnuoc:active { background-color: #ef4444; color: white; }

        .debug-info {
            font-family: monospace;
            background: #eee; padding: 10px; border: 1px solid #ccc;
            width: 100%; margin-top: 15px; text-align: left;
        }
    </style>
</head>
<body>

    <div class="box streamvideo">
        <h3>HÌNH ẢNH CAMERA</h3>
        <p id="status-text" class="status">Loading...</p>
        <img id="stream" src="http://10.114.192.200/stream" alt="Video Stream">
    </div>

    <div class="box controlbox">
        <h3>BẢNG ĐIỀU KHIỂN</h3>
        
        <label style="font-size: 18px; font-weight: bold;">
            <input type="checkbox" id="chk-brake" checked style="width: 18px; height: 18px;"> 
            BẬT PHANH TỰ ĐỘNG
        </label>

        <div class="joy-bg" id="joy-bg">
            <div class="joy-stick" id="joy-stick"></div>
        </div>

        <button id="maybomnuoc" class="maybomnuoc">BẬT BƠM NƯỚC</button>

        <div class="debug-info">
            <strong>PWM:</strong><br>
            Bánh Trái (L): <span id="val-l">0</span><br>
            Bánh Phải (R): <span id="val-r">0</span>
        </div>
    </div>
    <script>
        let motorL = 0, motorR = 0, pumpActive = 0;

        const WS_URL = 'ws://10.114.192.200:81/';
        let ws;
        const statusText = document.getElementById('status-text');

        function connectWS() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => { statusText.innerText = "Trạng thái: Đã kết nối Wi-Fi"; statusText.className = "status ok"; };
            ws.onclose = () => { statusText.innerText = "Trạng thái: Mất kết nối"; statusText.className = "status"; setTimeout(connectWS, 2000); };
        }
        function sendCommand() {
            let autoBrake = document.getElementById('chk-brake').checked ? 1 : 0;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ L: motorL, R: motorR, A: autoBrake, P: pumpActive }));
            }
            document.getElementById('val-l').innerText = motorL;
            document.getElementById('val-r').innerText = motorR;
        }
        const btnPump = document.getElementById('maybomnuoc');
        const startPump = (e) => { e.preventDefault(); pumpActive = 1; sendCommand(); };
        const stopPump = (e) => { e.preventDefault(); pumpActive = 0; sendCommand(); };
        btnPump.onmousedown = startPump; btnPump.onmouseup = stopPump; btnPump.onmouseleave = stopPump;
        btnPump.ontouchstart = startPump; btnPump.ontouchend = stopPump;

        document.getElementById('chk-brake').onchange = sendCommand;

        const bg = document.getElementById('joy-bg');
        const stick = document.getElementById('joy-stick');
        let isDragging = false;
        const maxR = bg.clientWidth / 2 - stick.clientWidth / 2; 

        function moveJoy(clientX, clientY) {
            if (!isDragging) return;
            const rect = bg.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            let dx = clientX - cx;
            let dy = clientY - cy;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > maxR) { dx = (dx / dist) * maxR; dy = (dy / dist) * maxR; }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;

            let fwd = (-dy / maxR) * 255; 
            let turn = (dx / maxR) * 255;

            motorL = Math.round(Math.max(-255, Math.min(255, fwd + turn)));
            motorR = Math.round(Math.max(-255, Math.min(255, fwd - turn)));
            sendCommand();
        }

        function stopJoy() {
            isDragging = false;
            stick.style.transform = `translate(0px, 0px)`;
            motorL = 0; motorR = 0;
            sendCommand();
        }

        stick.onmousedown = () => isDragging = true;
        document.onmousemove = (e) => moveJoy(e.clientX, e.clientY);
        document.onmouseup = stopJoy;

        stick.ontouchstart = (e) => { isDragging = true; e.preventDefault(); };
        document.ontouchmove = (e) => { if(isDragging) moveJoy(e.touches[0].clientX, e.touches[0].clientY); };
        document.ontouchend = stopJoy;

    </script>
</body>
</html>
